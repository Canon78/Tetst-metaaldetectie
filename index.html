<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Vondsten App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #d4af37; /* Goud */
            --accent-blue: #4a90e2;
            --accent-red: #cc0000;
            --btn-green: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            padding-bottom: 80px; /* Ruimte voor het menu onderaan */
        }

        h1, h2 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 5px;
        }

        /* Navigatiebalk onderaan */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #111;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid var(--accent-color);
            z-index: 999;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            width: auto;
            padding: 0;
            margin: 0;
        }

        .nav-btn.active {
            color: var(--accent-color);
        }

        /* Schermen verbergen/tonen */
        .app-page {
            display: none;
        }

        .app-page.active {
            display: block;
        }

        .form-container {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background-color: #1a1a1a;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
        }

        textarea {
            height: 80px;
            resize: vertical;
        }

        /* NIEUW: Zoekbalk styling */
        .search-container {
            margin-bottom: 15px;
        }

        .search-input {
            border: 1px solid var(--accent-color);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23d4af37" class="bi bi-search" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>');
            background-repeat: no-repeat;
            background-position: 12px center;
            padding-left: 40px;
        }

        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .tag-btn {
            background-color: #444;
            color: #ccc;
            border: 1px solid #555;
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            margin-bottom: 0;
            font-weight: normal;
        }

        .tag-btn:hover {
            border-color: var(--accent-color);
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: black;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button.gps-btn {
            background-color: var(--accent-blue);
            color: white;
        }

        button.excel-btn {
            background-color: var(--btn-green);
            color: white;
            margin-top: 20px;
        }

        button.danger-btn {
            background-color: #444;
            color: #ff6666;
            border: 1px solid var(--accent-red);
            padding: 8px;
            font-size: 12px;
            margin-top: 30px;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-small {
            padding: 8px 14px;
            font-size: 13px;
            width: auto;
            margin-bottom: 0;
        }

        .btn-map { background-color: #555; color: var(--accent-color); border: 1px solid var(--accent-color); }
        .btn-edit { background-color: #e67e22; color: white; }
        .btn-delete { background-color: var(--accent-red); color: white; }
        .btn-info { background-color: var(--accent-blue); color: white; }

        .maps-btn-inline {
            display: block;
            width: 100%;
            text-align: center;
            padding: 8px;
            background-color: #111;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            font-size: 13px;
            border-radius: 4px;
            text-decoration: none;
            margin-top: 8px;
            box-sizing: border-box;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .tab {
            padding: 10px 18px;
            background-color: var(--card-bg);
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #444;
            font-size: 14px;
        }

        .tab.active {
            background-color: var(--accent-color);
            color: black;
            font-weight: bold;
        }

        .vondst-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--accent-color);
        }

        .vondst-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .vondst-meta {
            font-size: 14px;
            color: #ccc;
            margin: 5px 0;
        }

        .foto-container {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .img-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            border: 2px solid #555;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background-color: #1a1a1a;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .zoom-icon {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background-color: rgba(0, 0, 0, 0.6);
            color: var(--accent-color);
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 10px;
            pointer-events: none;
        }

        .inline-map {
            width: 100%;
            height: 220px;
            border-radius: 6px;
            margin-top: 10px;
            border: 1px solid var(--accent-color);
            display: none;
        }

        .preview-img-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .preview-img {
            max-width: 48%;
            height: auto;
            border-radius: 6px;
            display: none;
        }

        .leaflet-popup-content { color: #000000 !important; }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 70%;
            border-radius: 8px;
            border: 3px solid var(--accent-color);
        }

        .info-box {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            color: white;
        }

        .info-box h3 {
            margin-top: 0;
            color: var(--accent-color);
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .lightbox-caption {
            color: white;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--card-bg);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🪙 Mijn Vondsten Log</h1>

    <div id="page-verzameling" class="app-page active">
        <h2>Mijn Verzameling</h2>
        
        <div class="search-container">
            <input type="text" id="app-search" class="search-input" placeholder="Zoek op naam, materiaal, datering of info..." oninput="filterVondstenLive()">
        </div>

        <div class="tabs">
            <div class="tab active" onclick="filterCategorie(event, 'Alles')">Alles</div>
            <div class="tab" onclick="filterCategorie(event, 'Munten')">🪙 Munten</div>
            <div class="tab" onclick="filterCategorie(event, 'Gespen')">🔍 Gespen</div>
            <div class="tab" onclick="filterCategorie(event, 'Militaria')">🛡️ Militaria</div>
            <div class="tab" onclick="filterCategorie(event, 'Gebruiksvoorwerpen')">🗝️ Voorwerpen</div>
            <div class="tab" onclick="filterCategorie(event, 'Overig')">🏺 Overig</div>
        </div>

        <div id="vondsten-lijst"></div>
        
        <button class="excel-btn" onclick="exporteerNaarCSV()">📥 Exporteer naar Excel (CSV)</button>
        <button class="danger-btn" onclick="wisAlles()">⚠️ App Geheugen Volledig Wissen</button>
    </div>

    <div id="page-invoer" class="app-page">
        <div class="form-container">
            <h2 id="form-titel">Nieuwe Vondst</h2>
            <input type="hidden" id="bewerk-id" value="">
            
            <div class="form-group">
                <label for="categorie">Categorie (Mapje)</label>
                <select id="categorie">
                    <option value="Munten">🪙 Munten</option>
                    <option value="Gespen">🔍 Gespen & Knopen</option>
                    <option value="Militaria">🛡️ Militaria</option>
                    <option value="Gebruiksvoorwerpen">🗝️ Gebruiksvoorwerpen</option>
                    <option value="Overig">🏺 Overig / Keramiek</option>
                </select>
            </div>

            <div class="form-group">
                <label for="materiaal">Metaal / Materiaal</label>
                <select id="materiaal">
                    <option value="Onbekend">❓ Onbekend</option>
                    <option value="Goud">🪙 Goud</option>
                    <option value="Zilver">🥈 Zilver</option>
                    <option value="Brons / Koper">🥉 Brons / Koper</option>
                    <option value="Lood / Tin">🛡️ Lood / Tin</option>
                    <option value="IJzer">⚙️ IJzer</option>
                    <option value="Glas / Keramiek">🏺 Glas / Keramiek</option>
                </select>
            </div>

            <div class="form-group">
                <label for="titel">Beschrijving / Naam</label>
                <input type="text" id="titel" placeholder="Bijv. Romeinse denarius, koperen knoop...">
            </div>

            <div class="form-group">
                <label for="datering">Vermoedelijke Periode</label>
                <input type="text" id="datering" placeholder="Bijv. 2e eeuw na Chr., Middeleeuws...">
                <div class="quick-tags">
                    <button type="button" class="tag-btn" onclick="setDatering('Romeins')">Romeins</button>
                    <button type="button" class="tag-btn" onclick="setDatering('Middeleeuws')">Middeleeuws</button>
                    <button type="button" class="tag-btn" onclick="setDatering('16e-18e eeuw')">16e-18e eeuw</button>
                    <button type="button" class="tag-btn" onclick="setDatering('Modern / WO')">Modern / WO</button>
                </div>
            </div>

            <div class="form-group">
                <label for="locatie">GPS Coördinaten</label>
                <input type="text" id="locatie" placeholder="Klik op de blauwe knop of typ zelf">
                <button type="button" class="gps-btn" onclick="haalGPS()">📍 Leg Huidige GPS Vast</button>
            </div>

            <div class="form-group">
                <label for="info">📜 Extra Informatie</label>
                <textarea id="info" placeholder="Waarvoor diende het? Details..."></textarea>
            </div>

            <div class="form-group">
                <label for="foto1">📸 Foto 1 (Voorkant)</label>
                <input type="file" id="foto1" accept="image/*" onchange="verwerkFoto(event, 'img-preview1', 1)">
            </div>

            <div class="form-group">
                <label for="foto2">📸 Foto 2 (Achterkant)</label>
                <input type="file" id="foto2" accept="image/*" onchange="verwerkFoto(event, 'img-preview2', 2)">
            </div>

            <div class="preview-img-container">
                <img id="img-preview1" class="preview-img" alt="Voorbeeld Voorkant">
                <img id="img-preview2" class="preview-img" alt="Voorbeeld Achterkant">
            </div>

            <button id="opslaan-btn" onclick="slaVondstOp()">Vondst Opslaan</button>
            <button id="annuleer-btn" style="display:none; background-color:#555; color:white;" onclick="resetFormulier()">Annuleer Bewerken</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="nav-verzameling" class="nav-btn active" onclick="wisselScherm('verzameling')">
            <span>🎒</span>
            <span>Mijn Verzameling</span>
        </button>
        <button id="nav-invoer" class="nav-btn" onclick="wisselScherm('invoer')">
            <span>➕</span>
            <span>Nieuwe Vondst</span>
        </button>
    </div>

    <div id="lightbox" class="lightbox" onclick="sluitPopups(event)">
        <button class="lightbox-close" onclick="sluitPopups(event)">✕ Sluiten</button>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Vergroting" style="display:none;">
        <div id="lightbox-caption" class="lightbox-caption" style="display:none;"></div>
        <div id="info-popup-box" class="info-box" style="display:none;">
            <h3 id="info-popup-titel">Voorwerp Info</h3>
            <p id="info-popup-tekst" style="white-space: pre-wrap; line-height: 1.5;"></p>
        </div>
    </div>

    <script>
        let foto1DataUrl = "";
        let foto2DataUrl = "";
        let actieveKaarten = {}; 
        let huidigeActieveCategorie = "Alles"; // Houdt de geselecteerde tab bij

        function wisselScherm(schermNaam) {
            document.querySelectorAll('.app-page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

            window.scrollTo(0, 0);

            if (schermNaam === 'verzameling') {
                document.getElementById('page-verzameling').classList.add('active');
                document.getElementById('nav-verzameling').classList.add('active');
                // Maak de zoekbalk leeg bij het wisselen van scherm voor een schone start
                document.getElementById('app-search').value = "";
                toonVondsten();
            } else if (schermNaam === 'invoer') {
                document.getElementById('page-invoer').classList.add('active');
                document.getElementById('nav-invoer').classList.add('active');
            }
        }

        function setDatering(waarde) {
            document.getElementById('datering').value = waarde;
        }

        function haalGPS() {
            if (navigator.geolocation) {
                const opties = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById('locatie').value = 
                            position.coords.latitude.toFixed(6) + ", " + position.coords.longitude.toFixed(6);
                    }, 
                    function(error) { alert("GPS-signaal niet gevonden."); },
                    opties
                );
            }
        }

        function verwerkFoto(event, previewId, fotoNummer) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 600; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const gecomprimeerdeDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const preview = document.getElementById(previewId);
                    preview.src = gecomprimeerdeDataUrl;
                    preview.style.display = 'block';

                    if (fotoNummer === 1) foto1DataUrl = gecomprimeerdeDataUrl;
                    if (fotoNummer === 2) foto2DataUrl = gecomprimeerdeDataUrl;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function slaVondstOp() {
            const categorie = document.getElementById('categorie').value;
            const materiaal = document.getElementById('materiaal').value;
            const titel = document.getElementById('titel').value;
            const datering = document.getElementById('datering').value;
            const locatie = document.getElementById('locatie').value;
            const info = document.getElementById('info').value;
            const bewerkId = document.getElementById('bewerk-id').value;

            if(!titel) { alert("Vul tenminste een beschrijving in."); return; }

            let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];

            if (bewerkId) {
                huidigeVondsten = huidigeVondsten.map(vondst => {
                    if (vondst.id == bewerkId) {
                        return {
                            id: vondst.id,
                            categorie, materiaal, titel, datering, locatie, info,
                            foto1: foto1DataUrl || vondst.foto1,
                            foto2: foto2DataUrl || vondst.foto2
                        };
                    }
                    return vondst;
                });
                alert("Vondst succesvol bijgewerkt!");
            } else {
                const nieuweVondst = {
                    id: Date.now(),
                    categorie, materiaal, titel, datering, locatie, info,
                    foto1: foto1DataUrl,
                    foto2: foto2DataUrl
                };
                huidigeVondsten.push(nieuweVondst);
                alert("Vondst succesvol opgeslagen!");
            }

            try {
                localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));
                resetFormulier();
                wisselScherm('verzameling'); 
            } catch (e) {
                alert("⚠️ Geheugen vol.");
            }
        }

        function resetFormulier() {
            document.getElementById('titel').value = "";
            document.getElementById('datering').value = "";
            document.getElementById('locatie').value = "";
            document.getElementById('info').value = "";
            document.getElementById('bewerk-id').value = "";
            document.getElementById('materiaal').value = "Onbekend";
            document.getElementById('foto1').value = "";
            document.getElementById('foto2').value = "";
            document.getElementById('img-preview1').style.display = 'none';
            document.getElementById('img-preview2').style.display = 'none';
            document.getElementById('form-titel').innerText = "Nieuwe Vondst";
            document.getElementById('opslaan-btn').innerText = "Vondst Opslaan";
            document.getElementById('annuleer-btn').style.display = 'none';
            foto1DataUrl = "";
            foto2DataUrl = "";
        }

        function toggleKaart(id, locatieSnaar, titel) {
            const mapDiv = document.getElementById(`map-${id}`);
            if (!mapDiv) return;

            if (mapDiv.style.display === 'block') {
                mapDiv.style.display = 'none';
                return;
            }

            mapDiv.style.display = 'block';

            if (!locatieSnaar || !locatieSnaar.includes(',')) return;
            const coords = locatieSnaar.split(',');
            const lat = parseFloat(coords[0].trim());
            const lng = parseFloat(coords[1].trim());

            if (!isNaN(lat) && !isNaN(lng)) {
                setTimeout(() => {
                    if (actieveKaarten[id]) {
                        actieveKaarten[id].invalidateSize();
                        return;
                    }

                    const m = L.map(`map-${id}`).setView([lat, lng], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);

                    const marker = L.marker([lat, lng]).addTo(m);
                    marker.bindPopup(`<b>${titel}</b>`).openPopup();
                    
                    actieveKaarten[id] = m;
                }, 200);
            }
        }

        function bewerkVondst(id) {
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            const vondst = huidigeVondsten.find(v => v.id == id);
            
            if (vondst) {
                document.getElementById('categorie').value = vondst.categorie;
                document.getElementById('materiaal').value = vondst.materiaal || "Onbekend";
                document.getElementById('titel').value = vondst.titel;
                document.getElementById('datering').value = vondst.datering || "";
                document.getElementById('locatie').value = vondst.locatie || "";
                document.getElementById('info').value = vondst.info || "";
                document.getElementById('bewerk-id').value = vondst.id;

                if (vondst.foto1) {
                    document.getElementById('img-preview1').src = vondst.foto1;
                    document.getElementById('img-preview1').style.display = 'block';
                    foto1DataUrl = vondst.foto1;
                }
                if (vondst.foto2) {
                    document.getElementById('img-preview2').src = vondst.foto2;
                    document.getElementById('img-preview2').style.display = 'block';
                    foto2DataUrl = vondst.foto2;
                }

                document.getElementById('form-titel').innerText = "✏️ Vondst Bewerken";
                document.getElementById('opslaan-btn').innerText = "Wijzigingen Opslaan";
                document.getElementById('annuleer-btn').style.display = 'block';

                wisselScherm('invoer');
            }
        }

        function verwijderVondst(id) {
            if (confirm("Weet je zeker dat je deze specifieke vondst wilt verwijderen?")) {
                let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
                huidigeVondsten = huidigeVondsten.filter(v => v.id != id);
                localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));
                toonVondsten(huidigeActieveCategorie);
            }
        }

        // GEUPGRADED: ToonVondsten ondersteunt nu ook live zoektermen
        function toonVondsten(filter = 'Alles', zoekTerm = "") {
            const lijst = document.getElementById('vondsten-lijst');
            lijst.innerHTML = "";
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            actieveKaarten = {}; 
            
            const schoneZoekTerm = zoekTerm.toLowerCase().trim();

            huidigeVondsten.forEach(vondst => {
                // 1. Filter op tabblad-categorie
                if (filter !== 'Alles' && vondst.categorie !== filter) return;

                // 2. Filter op zoekbalk-term
                if (schoneZoekTerm !== "") {
                    const inTitel = (vondst.titel || "").toLowerCase().includes(schoneZoekTerm);
                    const inMateriaal = (vondst.materiaal || "").toLowerCase().includes(schoneZoekTerm);
                    const inDatering = (vondst.datering || "").toLowerCase().includes(schoneZoekTerm);
                    const inInfo = (vondst.info || "").toLowerCase().includes(schoneZoekTerm);

                    // Als de zoekterm nergens in voorkomt, slaan we dit item over
                    if (!inTitel && !inMateriaal && !inDatering && !inInfo) return;
                }

                const schoneGps = (vondst.locatie || "").trim();
                const heeftGps = schoneGps.includes(',');
                const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(schoneGps)}`;

                const card = document.createElement('div');
                card.className = 'vondst-card';
                
                card.innerHTML = `
                    <div class="vondst-header">
                        <span>${vondst.titel}</span>
                        <span style="color:var(--accent-color); font-size:12px;">${vondst.categorie}</span>
                    </div>
                    <div class="vondst-meta">💎 <b>Materiaal:</b> ${vondst.materiaal || 'Onbekend'}</div>
                    <div class="vondst-meta">📅 <b>Datering:</b> ${vondst.datering || 'Onbekend'}</div>
                    <div class="vondst-meta">📍 <b>GPS Coördinaten:</b> ${schoneGps || 'Niet vastgelegd'}</div>
                    
                    <div class="foto-container">
                        ${vondst.foto1 ? `
                            <div class="img-wrapper" onclick="openFoto('${vondst.foto1}', '${vondst.titel} - Voorkant')">
                                <img src="${vondst.foto1}" class="card-img">
                                <div class="zoom-icon">🔍</div>
                            </div>` : ''}
                        ${vondst.foto2 ? `
                            <div class="img-wrapper" onclick="openFoto('${vondst.foto2}', '${vondst.titel} - Achterkant')">
                                <img src="${vondst.foto2}" class="card-img">
                                <div class="zoom-icon">🔍</div>
                            </div>` : ''}
                    </div>

                    <div id="map-${vondst.id}" class="inline-map"></div>
                    ${heeftGps ? `<a href="${googleMapsUrl}" target="_blank" id="gmaps-link-${vondst.id}" class="maps-btn-inline" style="display:none;">🗺️ Route openen in Google Maps</a>` : ''}

                    <div class="action-buttons">
                        <button class="btn-small btn-info" onclick="openInfo(${vondst.id})">ℹ️ Info</button>
                        ${heeftGps ? `<button class="btn-small btn-map" onclick="toggleKaart(${vondst.id}, '${schoneGps}', '${vondst.titel}'); document.getElementById('gmaps-link-${vondst.id}').style.display = (document.getElementById('gmaps-link-${vondst.id}').style.display === 'block' ? 'none' : 'block');">🗺️ Kaart</button>` : ''}
                        <button class="btn-small btn-edit" onclick="bewerkVondst(${vondst.id})">✏️ Bewerk</button>
                        <button class="btn-small btn-delete" onclick="verwijderVondst(${vondst.id})">🗑️ Wis</button>
                    </div>
                `;
                lijst.appendChild(card);
            });

            if(lijst.innerHTML === "") {
                lijst.innerHTML = "<p style='text-align:center; color:#888;'>Geen vondsten gevonden die voldoen aan de zoekopdracht.</p>";
            }
        }

        // NIEUW: Wordt geactiveerd bij elke letter die je typt
        function filterVondstenLive() {
            const zoekTerm = document.getElementById('app-search').value;
            toonVondsten(huidigeActieveCategorie, zoekTerm);
        }

        function filterCategorie(event, cat) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            huidigeActieveCategorie = cat;
            
            // Behoud de ingetypte zoekterm bij het wisselen van tabblad
            const zoekTerm = document.getElementById('app-search').value;
            toonVondsten(cat, zoekTerm);
        }

        function exporteerNaarCSV() {
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            if (huidigeVondsten.length === 0) { alert("Geen data."); return; }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "ID;Categorie;Materiaal;Beschrijving;Datering;GPS-Coordinaten;Extra Informatie\r\n";

            huidigeVondsten.forEach(v => {
                let schoneInfo = (v.info || "").replace(/;/g, ",").replace(/\r?\n|\r/g, " ");
                let schoneTitel = (v.titel || "").replace(/;/g, ",");
                let schoneDatering = (v.datering || "").replace(/;/g, ",");
                let schoneLocatie = (v.locatie || "").replace(/;/g, " ");
                csvContent += `${v.id};${v.categorie};${v.materiaal || 'Onbekend'};${schoneTitel};${schoneDatering};${schoneLocatie};${schoneInfo}\r\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Mijn_Vondsten_Backup.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function openFoto(src, caption) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox-caption').innerText = caption;
            document.getElementById('lightbox-img').style.display = 'block';
            document.getElementById('lightbox-caption').style.display = 'block';
            document.getElementById('info-popup-box').style.display = 'none';
            document.getElementById('lightbox').style.display = 'flex';
        }

        function openInfo(id) {
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            const vondst = huidigeVondsten.find(v => v.id == id);
            
            if (vondst) {
                document.getElementById('info-popup-titel').innerText = `📜 Info: ${vondst.titel}`;
                document.getElementById('info-popup-tekst').innerText = vondst.info || "Nog geen extra historische informatie toegevoegd.";
                document.getElementById('lightbox-img').style.display = 'none';
                document.getElementById('lightbox-caption').style.display = 'none';
                document.getElementById('info-popup-box').style.display = 'block';
                document.getElementById('lightbox').style.display = 'flex';
            }
        }

        function sluitPopups(event) {
            if (event.target.id === 'lightbox' || event.target.className === 'lightbox-close' || event.target.tagName === 'BUTTON') {
                document.getElementById('lightbox').style.display = 'none';
            }
        }

        function wisAlles() {
            if(confirm("Weet je zeker dat je ALLES wilt wissen?")) {
                localStorage.removeItem('detectorVondsten');
                resetFormulier();
                document.getElementById('app-search').value = "";
                toonVondsten();
                alert("Geheugen gewist!");
            }
        }

        window.onload = function() { toonVondsten(); };
    </script>
</body>
</html>
