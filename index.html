<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Vondsten App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #d4af37; /* Goud */
            --accent-blue: #4a90e2;
            --accent-red: #cc0000;
            --btn-green: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            padding-bottom: 60px;
        }

        h1, h2 {
            text-align: center;
            color: var(--accent-color);
        }

        /* Grote actieknop bovenaan */
        .scroll-to-form-btn {
            background-color: var(--accent-color);
            color: black;
            font-weight: bold;
            font-size: 18px;
            padding: 16px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
        }

        .form-container {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin-top: 30px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background-color: #1a1a1a;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
        }

        textarea {
            height: 80px;
            resize: vertical;
        }

        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 6px;
        }

        .tag-btn {
            background-color: #444;
            color: #ccc;
            border: 1px solid #555;
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            width: auto;
            margin-bottom: 0;
            font-weight: normal;
        }

        .tag-btn:hover {
            border-color: var(--accent-color);
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: black;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button.gps-btn {
            background-color: var(--accent-blue);
            color: white;
        }

        button.excel-btn {
            background-color: var(--btn-green);
            color: white;
            margin-top: 20px;
        }

        button.danger-btn {
            background-color: #444;
            color: #ff6666;
            border: 1px solid var(--accent-red);
            padding: 8px;
            font-size: 12px;
            margin-top: 30px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
            width: auto;
            margin-bottom: 0;
        }

        .btn-edit { background-color: #e67e22; color: white; }
        .btn-delete { background-color: var(--accent-red); color: white; }
        .btn-info { background-color: var(--accent-blue); color: white; }

        .maps-btn-inline {
            display: inline-block;
            width: auto;
            padding: 5px 10px;
            background-color: #444;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            font-size: 12px;
            border-radius: 4px;
            text-decoration: none;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .tab {
            padding: 10px 18px;
            background-color: var(--card-bg);
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #444;
            font-size: 14px;
        }

        .tab.active {
            background-color: var(--accent-color);
            color: black;
            font-weight: bold;
        }

        .vondst-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--accent-color);
        }

        .vondst-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .vondst-meta {
            font-size: 14px;
            color: #ccc;
            margin: 5px 0;
        }

        .foto-container {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .img-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            border: 2px solid #555;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background-color: #1a1a1a;
        }

        .img-wrapper:hover { border-color: var(--accent-color); }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .zoom-icon {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background-color: rgba(0, 0, 0, 0.6);
            color: var(--accent-color);
            border-radius: 4px;
            padding: 2px 4px;
            font-size: 10px;
            pointer-events: none;
        }

        #map {
            width: 100%;
            height: 350px;
            border-radius: 10px;
            margin-top: 10px;
            margin-bottom: 25px;
            border: 2px solid var(--accent-color);
            z-index: 1;
        }

        .leaflet-popup-content { color: #000000 !important; }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 70%;
            border-radius: 8px;
            border: 3px solid var(--accent-color);
        }

        .info-box {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            padding: 20px;
            border-radius: 10px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            color: white;
        }

        .info-box h3 {
            margin-top: 0;
            color: var(--accent-color);
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }

        .lightbox-caption {
            color: white;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: var(--card-bg);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🪙 Mijn Vondsten Log</h1>

    <button type="button" class="scroll-to-form-btn" onclick="scroleNaarFormulier()">➕ Nieuwe Vondst Toevoegen</button>

    <h2>🗺️ Mijn Vondstenkaart</h2>
    <div id="map"></div>

    <h2>Mijn Verzameling</h2>
    <div class="tabs">
        <div class="tab active" onclick="filterCategorie(event, 'Alles')">Alles</div>
        <div class="tab" onclick="filterCategorie(event, 'Munten')">🪙 Munten</div>
        <div class="tab" onclick="filterCategorie(event, 'Gespen')">🔍 Gespen</div>
        <div class="tab" onclick="filterCategorie(event, 'Militaria')">🛡️ Militaria</div>
        <div class="tab" onclick="filterCategorie(event, 'Gebruiksvoorwerpen')">🗝️ Voorwerpen</div>
        <div class="tab" onclick="filterCategorie(event, 'Overig')">🏺 Overig</div>
    </div>

    <div id="vondsten-lijst"></div>


    <div class="form-container" id="invoer-formulier">
        <h2 id="form-titel">Nieuwe Vondst Invoeren</h2>
        <input type="hidden" id="bewerk-id" value="">
        
        <div class="form-group">
            <label for="categorie">Categorie (Mapje)</label>
            <select id="categorie">
                <option value="Munten">🪙 Munten</option>
                <option value="Gespen">🔍 Gespen & Knopen</option>
                <option value="Militaria">🛡️ Militaria</option>
                <option value="Gebruiksvoorwerpen">🗝️ Gebruiksvoorwerpen</option>
                <option value="Overig">🏺 Overig / Keramiek</option>
            </select>
        </div>

        <div class="form-group">
            <label for="materiaal">Metaal / Materiaal</label>
            <select id="materiaal">
                <option value="Onbekend">❓ Onbekend</option>
                <option value="Goud">🪙 Goud</option>
                <option value="Zilver">🥈 Zilver</option>
                <option value="Brons / Koper">🥉 Brons / Koper</option>
                <option value="Lood / Tin">🛡️ Lood / Tin</option>
                <option value="IJzer">⚙️ IJzer</option>
                <option value="Glas / Keramiek">🏺 Glas / Keramiek</option>
            </select>
        </div>

        <div class="form-group">
            <label for="titel">Beschrijving / Naam</label>
            <input type="text" id="titel" placeholder="Bijv. Romeinse denarius, koperen knoop...">
        </div>

        <div class="form-group">
            <label for="datering">Vermoedelijke Periode</label>
            <input type="text" id="datering" placeholder="Bijv. 2e eeuw na Chr., Middeleeuws...">
            <div class="quick-tags">
                <button type="button" class="tag-btn" onclick="setDatering('Romeins')">Romeins</button>
                <button type="button" class="tag-btn" onclick="setDatering('Middeleeuws')">Middeleeuws</button>
                <button type="button" class="tag-btn" onclick="setDatering('16e-18e eeuw')">16e-18e eeuw</button>
                <button type="button" class="tag-btn" onclick="setDatering('Modern / WO')">Modern / WO</button>
            </div>
        </div>

        <div class="form-group">
            <label for="locatie">GPS Coördinaten</label>
            <input type="text" id="locatie" placeholder="Klik op de blauwe knop of typ zelf">
            <button type="button" class="gps-btn" onclick="haalGPS()">📍 Leg Huidige GPS Vast</button>
        </div>

        <div class="form-group">
            <label for="info">📜 Extra Informatie (Functie, achtergrond, determinatie...)</label>
            <textarea id="info" placeholder="Waarvoor diende het? Welke details vallen op? Schrijf het hier..."></textarea>
        </div>

        <div class="form-group">
            <label for="foto1">📸 Foto 1 (Voorkant)</label>
            <input type="file" id="foto1" accept="image/*" onchange="verwerkFoto(event, 'img-preview1', 1)">
        </div>

        <div class="form-group">
            <label for="foto2">📸 Foto 2 (Achterkant)</label>
            <input type="file" id="foto2" accept="image/*" onchange="verwerkFoto(event, 'img-preview2', 2)">
        </div>

        <div class="preview-img-container">
            <img id="img-preview1" class="preview-img" alt="Voorbeeld Voorkant">
            <img id="img-preview2" class="preview-img" alt="Voorbeeld Achterkant">
        </div>

        <button id="opslaan-btn" onclick="slaVondstOp()">Vondst Opslaan</button>
        <button id="annuleer-btn" style="display:none; background-color:#555; color:white;" onclick="resetFormulier()">Annuleer Bewerken</button>
    </div>

    <button class="excel-btn" onclick="exporteerNaarCSV()">📥 Exporteer Vondsten naar Excel (CSV)</button>
    <button class="danger-btn" onclick="wisAlles()">⚠️ App Geheugen Volledig Wissen</button>

    <div id="lightbox" class="lightbox" onclick="sluitPopups(event)">
        <button class="lightbox-close" onclick="sluitPopups(event)">✕ Sluiten</button>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Vergroting" style="display:none;">
        <div id="lightbox-caption" class="lightbox-caption" style="display:none;"></div>
        <div id="info-popup-box" class="info-box" style="display:none;">
            <h3 id="info-popup-titel">Voorwerp Info</h3>
            <p id="info-popup-tekst" style="white-space: pre-wrap; line-height: 1.5;"></p>
        </div>
    </div>

    <script>
        let foto1DataUrl = "";
        let foto2DataUrl = "";
        let map;
        let markerGroup;

        function initKaart() {
            map = L.map('map').setView([51.3, 4.4], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
            markerGroup = L.layerGroup().addTo(map);
            updateKaartPinnetjes();
        }

        // Automatische scroll-functies voor gebruiksgemak
        function scroleNaarFormulier() {
            document.getElementById('invoer-formulier').scrollIntoView({ behavior: 'smooth' });
        }

        function scroleNaarBoven() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setDatering(waarde) {
            document.getElementById('datering').value = waarde;
        }

        function haalGPS() {
            if (navigator.geolocation) {
                const opties = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById('locatie').value = 
                            position.coords.latitude.toFixed(6) + ", " + position.coords.longitude.toFixed(6);
                    }, 
                    function(error) { alert("GPS-signaal niet gevonden."); },
                    opties
                );
            }
        }

        function verwerkFoto(event, previewId, fotoNummer) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 600; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const gecomprimeerdeDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const preview = document.getElementById(previewId);
                    preview.src = gecomprimeerdeDataUrl;
                    preview.style.display = 'block';

                    if (fotoNummer === 1) foto1DataUrl = gecomprimeerdeDataUrl;
                    if (fotoNummer === 2) foto2DataUrl = gecomprimeerdeDataUrl;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function slaVondstOp() {
            const categorie = document.getElementById('categorie').value;
            const materiaal = document.getElementById('materiaal').value;
            const titel = document.getElementById('titel').value;
            const datering = document.getElementById('datering').value;
            const locatie = document.getElementById('locatie').value;
            const info = document.getElementById('info').value;
            const bewerkId = document.getElementById('bewerk-id').value;

            if(!titel) { alert("Vul tenminste een beschrijving in."); return; }

            let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];

            if (bewerkId) {
                huidigeVondsten = huidigeVondsten.map(vondst => {
                    if (vondst.id == bewerkId) {
                        return {
                            id: vondst.id,
                            categorie, materiaal, titel, datering, locatie, info,
                            foto1: foto1DataUrl || vondst.foto1,
                            foto2: foto2DataUrl || vondst.foto2
                        };
                    }
                    return vondst;
                });
                alert("Vondst succesvol bijgewerkt!");
            } else {
                const nieuweVondst = {
                    id: Date.now(),
                    categorie, materiaal, titel, datering, locatie, info,
                    foto1: foto1DataUrl,
                    foto2: foto2DataUrl
                };
                huidigeVondsten.push(nieuweVondst);
                alert("Vondst succesvol opgeslagen!");
            }

            try {
                localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));
                resetFormulier();
                toonVondsten();
                updateKaartPinnetjes();
                scroleNaarBoven(); // Na opslaan direct weer naar je kaart/lijst springen
            } catch (e) {
                alert("⚠️ Geheugen vol. Exporteer je data en wis oude items.");
            }
        }

        function resetFormulier() {
            document.getElementById('titel').value = "";
            document.getElementById('datering').value = "";
            document.getElementById('locatie').value = "";
            document.getElementById('info').value = "";
            document.getElementById('bewerk-id').value = "";
            document.getElementById('materiaal').value = "Onbekend";
            document.getElementById('foto1').value = "";
            document.getElementById('foto2').value = "";
            document.getElementById('img-preview1').style.display = 'none';
            document.getElementById('img-preview2').style.display = 'none';
            
            document.getElementById('form-titel').innerText = "Nieuwe Vondst Invoeren";
            document.getElementById('opslaan-btn').innerText = "Vondst Opslaan";
            document.getElementById
