<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Vondsten App</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #d4af37; /* Goud */
            --accent-blue: #4a90e2;
            --accent-red: #cc0000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            padding-bottom: 60px;
        }

        h1, h2 {
            text-align: center;
            color: var(--accent-color);
        }

        .form-container {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #444;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background-color: #1a1a1a;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: black;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button.gps-btn {
            background-color: var(--accent-blue);
            color: white;
        }

        button.danger-btn {
            background-color: #444;
            color: #ff6666;
            border: 1px solid var(--accent-red);
            padding: 8px;
            font-size: 12px;
            margin-top: 30px;
        }

        .maps-btn-inline {
            display: inline-block;
            width: auto;
            padding: 5px 10px;
            background-color: #444;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            font-size: 12px;
            border-radius: 4px;
            text-decoration: none;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .tab {
            padding: 10px 18px;
            background-color: var(--card-bg);
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #444;
            font-size: 14px;
        }

        .tab.active {
            background-color: var(--accent-color);
            color: black;
            font-weight: bold;
        }

        .vondst-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 5px solid var(--accent-color);
        }

        .vondst-header {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
            margin-bottom: 10px;
        }

        .vondst-meta {
            font-size: 14px;
            color: #ccc;
            margin: 5px 0;
        }

        .foto-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .preview-img {
            max-width: 48%;
            height: auto;
            border-radius: 6px;
            display: none;
        }

        .card-img {
            width: 48%;
            height: auto;
            border-radius: 6px;
            object-fit: cover;
        }

        #map {
            width: 100%;
            height: 350px;
            border-radius: 10px;
            margin-top: 15px;
            border: 2px solid var(--accent-color);
            z-index: 1;
        }

        .leaflet-popup-content {
            color: #000000 !important;
        }
    </style>
</head>
<body>

    <h1>🪙 Mijn Vondsten Log</h1>

    <div class="form-container">
        <h2>Nieuwe Vondst</h2>
        
        <div class="form-group">
            <label for="categorie">Categorie (Mapje)</label>
            <select id="categorie">
                <option value="Munten">🪙 Munten</option>
                <option value="Gespen">🔍 Gespen & Knopen</option>
                <option value="Militaria">🛡️ Militaria</option>
                <option value="Gebruiksvoorwerpen">🗝️ Gebruiksvoorwerpen</option>
                <option value="Overig">🏺 Overig / Keramiek</option>
            </select>
        </div>

        <div class="form-group">
            <label for="titel">Beschrijving / Naam</label>
            <input type="text" id="titel" placeholder="Bijv. Romeinse denarius, koperen knoop...">
        </div>

        <div class="form-group">
            <label for="datering">Vermoedelijke Periode</label>
            <input type="text" id="datering" placeholder="Bijv. 2e eeuw na Chr., Middeleeuws...">
        </div>

        <div class="form-group">
            <label for="locatie">GPS Coördinaten</label>
            <input type="text" id="locatie" placeholder="Klik op de blauwe knop of typ zelf">
            <button type="button" class="gps-btn" onclick="haalGPS()">📍 Leg Huidige GPS Vast</button>
        </div>

        <div class="form-group">
            <label for="foto1">📸 Foto 1 (Voorkant)</label>
            <input type="file" id="foto1" accept="image/*" onchange="verwerkFoto(event, 'img-preview1', 1)">
        </div>

        <div class="form-group">
            <label for="foto2">📸 Foto 2 (Achterkant)</label>
            <input type="file" id="foto2" accept="image/*" onchange="verwerkFoto(event, 'img-preview2', 2)">
        </div>

        <div class="foto-container">
            <img id="img-preview1" class="preview-img" alt="Voorbeeld Voorkant">
            <img id="img-preview2" class="preview-img" alt="Voorbeeld Achterkant">
        </div>

        <button onclick="slaVondstOp()">Vondst Opslaan</button>
    </div>

    <h2>🗺️ Mijn Vondstenkaart</h2>
    <div id="map"></div>

    <h2>Mijn Verzameling</h2>
    <div class="tabs">
        <div class="tab active" onclick="filterCategorie(event, 'Alles')">Alles</div>
        <div class="tab" onclick="filterCategorie(event, 'Munten')">🪙 Munten</div>
        <div class="tab" onclick="filterCategorie(event, 'Gespen')">🔍 Gespen</div>
        <div class="tab" onclick="filterCategorie(event, 'Militaria')">🛡️ Militaria</div>
        <div class="tab" onclick="filterCategorie(event, 'Gebruiksvoorwerpen')">🗝️ Voorwerpen</div>
        <div class="tab" onclick="filterCategorie(event, 'Overig')">🏺 Overig</div>
    </div>

    <div id="vondsten-lijst"></div>

    <button class="danger-btn" onclick="wisAlles()">⚠️ App Geheugen Volledig Wissen</button>

    <script>
        let foto1DataUrl = "";
        let foto2DataUrl = "";
        let map;
        let markerGroup;

        function initKaart() {
            map = L.map('map').setView([51.3, 4.4], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
            markerGroup = L.layerGroup().addTo(map);
            updateKaartPinnetjes();
        }

        function haalGPS() {
            if (navigator.geolocation) {
                const opties = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById('locatie').value = 
                            position.coords.latitude.toFixed(6) + ", " + position.coords.longitude.toFixed(6);
                    }, 
                    function(error) { alert("GPS-signaal niet gevonden."); },
                    opties
                );
            }
        }

        // SLIMME UPGRADE: Foto's automatisch verkleinen (compressie)
        function verwerkFoto(event, previewId, fotoNummer) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 600; // Maximale breedte/hoogte in pixels
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2m');
                    ctx.drawImage(img, 0, 0, width, height);

                    // Maak er een lichte JPG van (kwaliteit 0.7)
                    const gecomprimeerdeDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const preview = document.getElementById(previewId);
                    preview.src = gecomprimeerdeDataUrl;
                    preview.style.display = 'block';

                    if (fotoNummer === 1) foto1DataUrl = gecomprimeerdeDataUrl;
                    if (fotoNummer === 2) foto2DataUrl = gecomprimeerdeDataUrl;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function slaVondstOp() {
            const categorie = document.getElementById('categorie').value;
            const titel = document.getElementById('titel').value;
            const datering = document.getElementById('datering').value;
            const locatie = document.getElementById('locatie').value;

            if(!titel) { alert("Vul tenminste een beschrijving in."); return; }

            const nieuweVondst = {
                id: Date.now(),
                categorie, titel, datering, locatie, 
                foto1: foto1DataUrl,
                foto2: foto2DataUrl
            };

            try {
                let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
                huidigeVondsten.push(nieuweVondst);
                localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));

                // Reset formulier
                document.getElementById('titel').value = "";
                document.getElementById('datering').value = "";
                document.getElementById('locatie').value = "";
                document.getElementById('foto1').value = "";
                document.getElementById('foto2').value = "";
                document.getElementById('img-preview1').style.display = 'none';
                document.getElementById('img-preview2').style.display = 'none';
                foto1DataUrl = "";
                foto2DataUrl = "";

                alert("Vondst succesvol opgeslagen!");
                toonVondsten();
                updateKaartPinnetjes();
            } catch (e) {
                alert("⚠️ Het geheugen zit vol door een te grote foto! Klik onderaan op de grijze knop om het geheugen te wissen en probeer het opnieuw met de nieuwe update.");
            }
        }

        function updateKaartPinnetjes() {
            markerGroup.clearLayers();
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            let geldigePunten = [];

            huidigeVondsten.forEach(vondst => {
                if (vondst.locatie && vondst.locatie.includes(',')) {
                    const coords = vondst.locatie.split(',');
                    const lat = parseFloat(coords[0].trim());
                    const lng = parseFloat(coords[1].trim());

                    if (!isNaN(lat) && !isNaN(lng)) {
                        const marker = L.marker([lat, lng]);
                        marker.bindPopup(`<b>${vondst.titel}</b><br><small>${vondst.categorie}</small>`);
                        markerGroup.addLayer(marker);
                        geldigePunten.push([lat, lng]);
                    }
                }
            });

            if (geldigePunten.length > 0) {
                const bounds = L.latLngBounds(geldigePunten);
                map.fitBounds(bounds, { padding: [30, 30] });
            }
        }

        function toonVondsten(filter = 'Alles') {
            const lijst = document.getElementById('vondsten-lijst');
            lijst.innerHTML = "";
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];

            huidigeVondsten.forEach(vondst => {
                if (filter !== 'Alles' && vondst.categorie !== filter) return;

                let gpsWeergave = 'Niet vastgelegd';
                if (vondst.locatie && vondst.locatie.includes(',')) {
                    const schoneGps = vondst.locatie.trim();
                    const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(schoneGps)}`;
                    gpsWeergave = `${schoneGps} <br><a href="${googleMapsUrl}" target="_blank" class="maps-btn-inline">🗺️ Open route in Google Maps</a>`;
                }

                const card = document.createElement('div');
                card.className = 'vondst-card';
                card.innerHTML = `
                    <div class="vondst-header">
                        <span>${vondst.titel}</span>
                        <span style="color:var(--accent-color); font-size:12px;">${vondst.categorie}</span>
                    </div>
                    <div class="vondst-meta">📅 <b>Datering:</b> ${vondst.datering || 'Onbekend'}</div>
                    <div class="vondst-meta">📍 <b>GPS:</b> ${gpsWeergave}</div>
                    <div class="foto-container">
                        ${vondst.foto1 ? `<img src="${vondst.foto1}" class="card-img">` : ''}
                        ${vondst.foto2 ? `<img src="${vondst.foto2}" class="card-img">` : ''}
                    </div>
                `;
                lijst.appendChild(card);
            });

            if(lijst.innerHTML === "") {
                lijst.innerHTML = "<p style='text-align:center; color:#888;'>Nog geen vondsten in dit mapje!</p>";
            }
        }

        function filterCategorie(event, cat) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            toonVondsten(cat);
        }

        function wisAlles() {
            if(confirm("Weet je zeker dat je ALLE opgeslagen vondsten wilt wissen om ruimte te maken?")) {
                localStorage.removeItem('detectorVondsten');
                toonVondsten();
                if(markerGroup) markerGroup.clearLayers();
                alert("Het geheugen is weer helemaal leeg en klaar voor gebruik!");
            }
        }

        window.onload = function() { 
            toonVondsten(); 
            initKaart();
        };
    </script>
</body>
</html>
