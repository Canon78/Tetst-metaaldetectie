<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metaaldetectievondsten</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Playfair+Display:ital,wght@0,600;1,400&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #141822;
            --card-bg: #1e2533;
            --text-color: #e2e8f0;
            --accent-gold: #d4af37;
            --accent-blue: #4a90e2;
            --accent-red: #e74c3c;
            --btn-green: #2ecc71;
            --btn-purple: #9b59b6;
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }

        .app-header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; border-bottom: 2px solid rgba(212, 175, 55, 0.2); padding-bottom: 15px; margin-bottom: 25px; }
        .main-app-title { grid-column: 2; font-family: 'Playfair Display', serif; font-size: 28px; color: var(--accent-gold); text-transform: uppercase; text-align: center; margin: 0; }
        .btn-top-invoer { grid-column: 3; justify-self: end; background-color: transparent; color: var(--accent-gold); border: 1px solid var(--accent-gold); padding: 8px 14px; font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer; }

        .app-page { display: none; }
        .app-page.active { display: block; }
        .form-container { background-color: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid #2d3748; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #94a3b8; font-size: 14px; }
        
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155 !important; background-color: #0f131a !important; color: #f1f5f9 !important; box-sizing: border-box; font-size: 16px; }
        input:focus, select:focus, textarea:focus { border-color: var(--accent-gold) !important; }

        .search-container { margin-bottom: 20px; }
        .search-input { border: 1px solid rgba(212, 175, 55, 0.4) !important; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23d4af37"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>'); background-repeat: no-repeat; background-position: 14px center; padding-left: 44px; border-radius: 30px; background-color: var(--card-bg) !important; }

        .tabs { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 20px; padding-bottom: 5px; }
        .tab { padding: 10px 18px; background-color: var(--card-bg); border-radius: 30px; white-space: nowrap; cursor: pointer; border: 1px solid #334155; font-size: 14px; color: #94a3b8; }
        
        .tab.cat-Alles.active { background-color: #d4af37; border-color: #d4af37; color: #000; font-weight: bold; }
        .tab.cat-Munten.active { background-color: #f1c40f; border-color: #f1c40f; color: #000; font-weight: bold; }
        .tab.cat-Gespen.active { background-color: #3498db; border-color: #3498db; color: #fff; font-weight: bold; }
        .tab.cat-Knopen.active { background-color: #1abc9c; border-color: #1abc9c; color: #000; font-weight: bold; }
        .tab.cat-Militaria.active { background-color: #e74c3c; border-color: #e74c3c; color: #fff; font-weight: bold; }
        .tab.cat-Gebruiksvoorwerpen.active { background-color: #2ecc71; border-color: #2ecc71; color: #000; font-weight: bold; }
        .tab.cat-Overig.active { background-color: #9b59b6; border-color: #9b59b6; color: #fff; font-weight: bold; }

        .vondst-card { background-color: var(--card-bg); border-radius: 12px; padding: 18px; margin-bottom: 18px; border-left: 4px solid #334155; }
        .vondst-card.cat-Munten { border-left-color: #f1c40f; }
        .vondst-card.cat-Gespen { border-left-color: #3498db; }
        .vondst-card.cat-Knopen { border-left-color: #1abc9c; }
        .vondst-card.cat-Militaria { border-left-color: #e74c3c; }
        .vondst-card.cat-Gebruiksvoorwerpen { border-left-color: #2ecc71; }
        .vondst-card.cat-Overig { border-left-color: #9b59b6; }

        .vondst-header { display: flex; justify-content: space-between; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 12px; }
        .vondst-meta { font-size: 14px; color: #cbd5e1; margin: 6px 0; }
        .foto-container { display: flex; gap: 12px; margin-top: 14px; }
        .img-wrapper { position: relative; width: 110px; height: 110px; border: 2px solid #334155 !important; border-radius: 8px; overflow: hidden; background-color: #0f131a !important; }
        .card-img { width: 100%; height: 100%; object-fit: cover; }
        .inline-map { width: 100%; height: 240px; border-radius: 8px; margin-top: 12px; border: 1px solid var(--accent-gold); display: none; }

        .action-buttons { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; border-top: 1px solid #334155; padding-top: 12px; }
        .btn-small { padding: 8px 14px; font-size: 13px; border-radius: 6px; border: 1px solid transparent !important; font-weight: bold; cursor: pointer; background-color: #0f131a !important; }
        .btn-info { color: var(--accent-blue) !important; border-color: rgba(74, 144, 226, 0.4) !important; }
        .btn-map { color: var(--accent-gold) !important; border-color: rgba(212, 175, 55, 0.4) !important; }
        .btn-edit { color: #e67e22 !important; border-color: rgba(230, 126, 34, 0.4) !important; }
        .btn-delete { color: #fc8181 !important; border-color: rgba(231, 76, 60, 0.4) !important; }

        .excel-box { background-color: var(--card-bg); padding: 20px; border-radius: 12px; margin-top: 30px; border: 1px dashed rgba(46, 204, 113, 0.3); }
        button.excel-btn { background-color: #0f131a; color: var(--btn-green); border: 1px solid rgba(46, 204, 113, 0.4); width: 100%; padding: 14px; border-radius: 8px; font-weight: bold; }
        button.danger-btn { background-color: #141822; color: #ff6666; border: 1px solid rgba(231, 76, 60, 0.4); padding: 10px; width: 100%; border-radius: 8px; }
        button.main-btn { width: 100%; padding: 14px; background-color: var(--accent-gold); color: #000; border: none; border-radius: 8px; font-weight: bold; }

        @media (max-width: 768px) {
            .app-header { display: grid; grid-template-columns: 1fr auto; gap: 10px; }
            .main-app-title { font-size: 22px; text-align: left; }
            .btn-top-invoer { padding: 8px 12px; font-size: 13px; }
            .btn-small { padding: 11px 14px; flex: 1 1 calc(50% - 6px); }
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div></div>
        <h1 class="main-app-title">Metaaldetectievondsten</h1>
        <button id="top-toggle-btn" class="btn-top-invoer" onclick="toggleInvoerFormulier()">➕ Nieuwe Vondst</button>
    </div>

    <div id="page-invoer" class="app-page">
        <div class="form-container">
            <h2 id="form-titel">Nieuwe Vondst</h2>
            <input type="hidden" id="bewerk-id" value="">
            
            <div class="form-group">
                <label for="categorie">Categorie (Mapje)</label>
                <select id="categorie">
                    <option value="Munten">🪙 Munten</option>
                    <option value="Gespen">🔍 Gespen</option>
                    <option value="Knopen">🧷 Knopen</option>
                    <option value="Militaria">🛡️ Militaria</option>
                    <option value="Gebruiksvoorwerpen">🗝️ Gebruiksvoorwerpen</option>
                    <option value="Overig">🏺 Overig / Keramiek</option>
                </select>
            </div>

            <div class="form-group">
                <label for="titel">Beschrijving / Naam</label>
                <input type="text" id="titel" placeholder="Bijv. Romeinse denarius...">
            </div>

            <div class="form-group">
                <label for="datering">Vermoedelijke Periode</label>
                <input type="text" id="datering" placeholder="Bijv. 2e eeuw na Chr...">
            </div>

            <div class="form-group">
                <label for="locatie-naam">📍 Stad / Dorp / Zoekveld</label>
                <input type="text" id="locatie-naam" placeholder="Bijv. Stabroek...">
            </div>

            <div class="form-group">
                <label for="locatie-gps">🌍 Exacte GPS Coördinaten</label>
                <input type="text" id="locatie-gps" placeholder="Plak coördinaten of Maps link">
            </div>

            <div class="form-group">
                <label for="info">📜 Extra Informatie</label>
                <textarea id="info" placeholder="Details..."></textarea>
            </div>

            <button class="main-btn" id="opslaan-btn" onclick="slaVondstOp()">Vondst Opslaan</button>
            <button class="main-btn" id="annuleer-btn" style="background-color:#334155; color:white;" onclick="sluitInvoerFormulier()">Annuleren</button>
        </div>
    </div>

    <div id="page-verzameling">
        <div class="search-container">
            <input type="text" id="app-search" class="search-input" placeholder="Zoek op omschrijving..." oninput="filterVondstenLive()">
        </div>

        <div class="tabs">
            <div class="tab active cat-Alles" onclick="filterCategorie(event, 'Alles')">Alles</div>
            <div class="tab cat-Munten" onclick="filterCategorie(event, 'Munten')">🪙 Munten</div>
            <div class="tab cat-Gespen" onclick="filterCategorie(event, 'Gespen')">🔍 Gespen</div>
            <div class="tab cat-Knopen" onclick="filterCategorie(event, 'Knopen')">🧷 Knopen</div>
            <div class="tab cat-Militaria" onclick="filterCategorie(event, 'Militaria')">🛡️ Militaria</div>
            <div class="tab cat-Gebruiksvoorwerpen" onclick="filterCategorie(event, 'Gebruiksvoorwerpen')">🗝️ Voorwerpen</div>
            <div class="tab cat-Overig" onclick="filterCategorie(event, 'Overig')">🏺 Overig</div>
        </div>

        <div id="vondsten-lijst"></div>
        
        <div class="excel-box">
            <h2>📥 Oude Vondsten uit Excel laden</h2>
            <div class="form-group">
                <label for="import-cat">Kies mapje</label>
                <select id="import-cat">
                    <option value="Munten">🪙 Munten</option>
                    <option value="Gespen">🔍 Gespen</option>
                    <option value="Knopen">🧷 Knopen</option>
                    <option value="Militaria">🛡️ Militaria</option>
                    <option value="Gebruiksvoorwerpen">🗝️ Gebruiksvoorwerpen</option>
                    <option value="Overig">🏺 Overig</option>
                </select>
            </div>
            <div class="form-group">
                <label for="csv-file">Selecteer .csv-bestand</label>
                <input type="file" id="csv-file" accept=".csv" onchange="importeerCSV(event)">
            </div>
        </div>

        <button class="excel-btn" onclick="exporteerNaarCSV()">📥 Back-up maken naar Excel (CSV)</button>
    </div>

    <script>
        let actieveKaarten = {}; 
        let huidigeActieveCategorie = "Alles";

        function toggleInvoerFormulier() {
            const formPage = document.getElementById('page-invoer');
            if(formPage.classList.contains('active')) { sluitInvoerFormulier(); } 
            else { formPage.classList.add('active'); }
        }

        function sluitInvoerFormulier() {
            document.getElementById('page-invoer').classList.remove('active');
            resetFormulier();
        }

        function maakGpsSchoon(invoerSnaar) {
            if (!invoerSnaar) return "";
            let text = invoerSnaar.trim();
            const regexCijfers = /(-?\d+\.\d+)[^\d-]+(-?\d+\.\d+)/;
            const matchCijfers = text.match(regexCijfers);
            if (matchCijfers) return `${matchCijfers[1]}, ${matchCijfers[2]}`;
            return text;
        }

        function slaVondstOp() {
            const categorie = document.getElementById('categorie').value;
            const titel = document.getElementById('titel').value;
            const datering = document.getElementById('datering').value;
            const locatieNaam = document.getElementById('locatie-naam').value;
            const ruweGps = document.getElementById('locatie-gps').value;
            const locatieGps = maakGpsSchoon(ruweGps);
            const info = document.getElementById('info').value;

            if(!titel) { alert("Vul een omschrijving in."); return; }

            let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            huidigeVondsten.push({ id: Date.now(), categorie, titel, datering, locatieNaam, locatieGps, info });
            
            localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));
            sluitInvoerFormulier();
            toonVondsten(huidigeActieveCategorie);
        }

        function resetFormulier() {
            document.getElementById('titel').value = "";
            document.getElementById('datering').value = "";
            document.getElementById('locatie-naam').value = "";
            document.getElementById('locatie-gps').value = "";
            document.getElementById('info').value = "";
        }

        // DE REDDINGS- ENGINE DIE OUDE CATEGORIEËN METEEN REPAREERT EN TOONT
        function toonVondsten(filter = 'Alles', zoekTerm = "") {
            const lijst = document.getElementById('vondsten-lijst');
            lijst.innerHTML = "";
            
            let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            
            // AUTOMATISCHE REPARATIE VAN OUDE 'GESPEN & KNOPEN' DATA BIJ HET LADEN
            huidigeVondsten = huidigeVondsten.map(v => {
                if (!v.categorie || v.categorie.includes('&') || v.categorie === "Gespen & Knopen") {
                    let t = (v.titel || "").toLowerCase();
                    v.categorie = t.includes('knoop') ? "Knopen" : "Gespen";
                }
                return v;
            });
            
            localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));
            const schoneZoekTerm = zoekTerm.toLowerCase().trim();

            huidigeVondsten.forEach(vondst => {
                if (filter !== 'Alles' && vondst.categorie !== filter) return;
                if (schoneZoekTerm && !vondst.titel.toLowerCase().includes(schoneZoekTerm)) return;

                const card = document.createElement('div');
                card.className = `vondst-card cat-${vondst.categorie}`;
                card.innerHTML = `
                    <div class="vondst-header">
                        <span>${vondst.titel}</span>
                        <span style="color:var(--accent-gold); font-size:12px;">${vondst.categorie}</span>
                    </div>
                    <div class="vondst-meta">📅 <b>Datering:</b> ${vondst.datering || 'Onbekend'}</div>
                    <div class="vondst-meta">📍 <b>Locatie:</b> ${vondst.locatieNaam || 'Niet vastgelegd'}</div>
                    <div class="action-buttons">
                        <button class="btn-small btn-info" onclick="alert('${vondst.info || "Geen extra info"}')">ℹ️ Info</button>
                        <button class="btn-small btn-delete" onclick="verwijderVondst(${vondst.id})">🗑️ Wis</button>
                    </div>
                `;
                lijst.appendChild(card);
            });

            if(lijst.innerHTML === "") lijst.innerHTML = "<p style='text-align:center; color:#64748b;'>Geen vondsten gevonden.</p>";
        }

        function verwijderVondst(id) {
            if (confirm("Verwijderen?")) {
                let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
                huidigeVondsten = huidigeVondsten.filter(v => v.id != id);
                localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));
                toonVondsten(huidigeActieveCategorie);
            }
        }

        function filterVondstenLive() { toonVondsten(huidigeActieveCategorie, document.getElementById('app-search').value); }
        function filterCategorie(event, cat) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            huidigeActieveCategorie = cat;
            toonVondsten(cat, document.getElementById('app-search').value);
        }

        window.onload = function() { toonVondsten(); };
    </script>
</body>
</html>
