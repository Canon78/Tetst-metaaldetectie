<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaaldetectievondsten</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #141822;       /* Diep antiek leisteen */
            --card-bg: #1e2533;        /* Iets lichter voor de kaartjes */
            --text-color: #e2e8f0;     /* Zacht wit/grijs */
            --accent-gold: #d4af37;    /* Museum Goud */
            --accent-blue: #4a90e2;
            --accent-red: #e74c3c;
            --btn-green: #2ecc71;
            --btn-purple: #9b59b6;
        }

        html {
            scroll-behavior: smooth;   /* Zorgt voor soepel scrollen */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .app-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            border-bottom: 2px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 15px;
            margin-bottom: 25px;
            margin-top: 10px;
        }

        .main-app-title {
            grid-column: 2;
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--accent-gold);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin: 0;
            text-align: center;
        }

        .btn-top-invoer {
            grid-column: 3;
            justify-self: end;
            background-color: transparent;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 8px 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: auto;
            margin: 0;
            transition: all 0.2s;
        }

        .btn-top-invoer:hover {
            background-color: rgba(212, 175, 55, 0.1);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--accent-gold);
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .app-page {
            display: none;
        }

        .app-page.active {
            display: block;
        }

        .form-container {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #2d3748;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #94a3b8;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background-color: #0f131a;
            color: white;
            box-sizing: border-box;
            font-size: 16px;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-gold);
        }

        textarea {
            height: 90px;
            resize: vertical;
        }

        .search-container {
            margin-bottom: 20px;
        }

        .search-input {
            border: 1px solid rgba(212, 175, 55, 0.4);
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23d4af37" class="bi bi-search" viewBox="0 0 16 16"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/></svg>');
            background-repeat: no-repeat;
            background-position: 14px center;
            padding-left: 44px;
            border-radius: 30px;
            background-color: var(--card-bg);
        }

        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .tag-btn {
            background-color: #1e2533;
            color: #94a3b8;
            border: 1px solid #334155;
            padding: 6px 12px;
            font-size: 13px;
            border-radius: 6px;
            cursor: pointer;
            width: auto;
            margin-bottom: 0;
        }

        .tag-btn:hover {
            border-color: var(--accent-gold);
            color: white;
        }

        button.main-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button.gps-btn {
            background-color: #1e293b;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            margin-top: 6px;
            padding: 10px;
            font-size: 14px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }

        .excel-box {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            border: 1px dashed rgba(46, 204, 113, 0.4);
        }

        button.excel-btn {
            background-color: #1e293b;
            color: var(--btn-green);
            border: 1px solid var(--btn-green);
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 10px;
        }

        button.danger-btn {
            background-color: #141822;
            color: #ff6666;
            border: 1px solid var(--accent-red);
            padding: 10px;
            font-size: 13px;
            margin-top: 20px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
            border-top: 1px solid #334155;
            padding-top: 12px;
        }

        .btn-small {
            padding: 8px 14px;
            font-size: 13px;
            width: auto;
            margin-bottom: 0;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-info { background-color: var(--accent-blue); color: white; }
        .btn-web { background-color: var(--btn-purple); color: white; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-map { background-color: #141822; color: var(--accent-gold); border: 1px solid var(--accent-gold); }
        .btn-edit { background-color: #e67e22; color: white; }
        .btn-delete { background-color: #334155; color: #fc8181; }

        .maps-btn-inline {
            display: block;
            width: 100%;
            text-align: center;
            padding: 10px;
            background-color: #0f131a;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            font-size: 13px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 8px;
            box-sizing: border-box;
            font-weight: bold;
        }

        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }

        .tab {
            padding: 10px 18px;
            background-color: var(--card-bg);
            border-radius: 30px;
            white-space: nowrap;
            cursor: pointer;
            border: 1px solid #334155;
            font-size: 14px;
            color: #94a3b8;
        }

        .tab.active {
            background-color: var(--accent-gold);
            color: #000;
            font-weight: bold;
            border-color: var(--accent-gold);
        }

        .vondst-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 18px;
            border-left: 4px solid var(--accent-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .vondst-header {
            display: flex;
            justify-content: space-between;
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
            margin-bottom: 12px;
            color: white;
        }

        .vondst-meta {
            font-size: 14px;
            color: #cbd5e1;
            margin: 6px 0;
        }

        .vondst-meta b {
            color: #94a3b8;
        }

        .foto-container {
            display: flex;
            gap: 12px;
            margin-top: 14px;
        }

        .img-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            border: 2px solid #334155;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background-color: #0f131a;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .zoom-icon {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background-color: rgba(0, 0, 0, 0.7);
            color: var(--accent-gold);
            border-radius: 4px;
            padding: 2px 5px;
            font-size: 10px;
            pointer-events: none;
        }

        .inline-map {
            width: 100%;
            height: 240px;
            border-radius: 8px;
            margin-top: 12px;
            border: 1px solid var(--accent-gold);
            display: none;
        }

        /* PHOTO PREVIEW MET FIX */
        .preview-img-container {
            display: flex;
            gap: 15px;
            margin-top: 12px;
            margin-bottom: 15px;
        }

        .preview-wrapper {
            display: none;
            flex-direction: column;
            width: 48%;
            align-items: center;
            background-color: #0f131a;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .preview-img {
            max-width: 100%;
            max-height: 140px;
            border-radius: 6px;
            object-fit: contain;
        }

        .btn-delete-photo {
            background-color: rgba(231, 76, 60, 0.2);
            color: #fc8181;
            border: 1px solid var(--accent-red);
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
            font-weight: bold;
            width: 100%;
            text-align: center;
        }
        .btn-delete-photo:hover { background-color: var(--accent-red); color: white; }

        .leaflet-popup-content { color: #000000 !important; }

        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.93);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 72%;
            border-radius: 8px;
            border: 2px solid var(--accent-gold);
        }

        .info-box {
            background-color: var(--card-bg);
            border: 1px solid var(--accent-gold);
            padding: 22px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
            color: white;
        }

        .info-box h3 {
            font-family: 'Playfair Display', serif;
            margin-top: 0;
            color: var(--accent-gold);
            border-bottom: 1px solid #334155;
            padding-bottom: 8px;
        }

        .lightbox-caption {
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold);
            margin-top: 15px;
            font-size: 18px;
            text-align: center;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #141822;
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }

        .scroll-to-top {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: var(--card-bg);
            color: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }
        .scroll-to-top:hover {
            background-color: var(--accent-gold);
            color: black;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <div></div>
        <h1 class="main-app-title">Metaaldetectievondsten</h1>
        <button id="top-toggle-btn" class="btn-top-invoer" onclick="toggleInvoerFormulier()">➕ Nieuwe Vondst</button>
    </div>

    <div id="page-invoer" class="app-page">
        <div class="form-container">
            <h2 id="form-titel">Nieuwe Vondst</h2>
            <input type="hidden" id="bewerk-id" value="">
            
            <div class="form-group">
                <label for="categorie">Categorie (Mapje)</label>
                <select id="categorie">
                    <option value="Munten">🪙 Munten</option>
                    <option value="Gespen">🔍 Gespen & Knopen</option>
                    <option value="Militaria">🛡️ Militaria</option>
                    <option value="Gebruiksvoorwerpen">🗝️ Gebruiksvoorwerpen</option>
                    <option value="Overig">🏺 Overig / Keramiek</option>
                </select>
            </div>

            <div class="form-group">
                <label for="materiaal">Metaal / Materiaal</label>
                <select id="materiaal">
                    <option value="Onbekend">❓ Onbekend</option>
                    <option value="Goud">🪙 Goud</option>
                    <option value="Zilver">🥈 Zilver</option>
                    <option value="Brons / Koper">🥉 Brons / Koper</option>
                    <option value="Lood / Tin">🛡️ Lood / Tin</option>
                    <option value="IJzer">⚙️ IJzer</option>
                    <option value="Glas / Keramiek">🏺 Glas / Keramiek</option>
                </select>
            </div>

            <div class="form-group">
                <label for="titel">Beschrijving / Naam</label>
                <input type="text" id="titel" placeholder="Bijv. Romeinse denarius, koperen knoop...">
            </div>

            <div class="form-group">
                <label for="datering">Vermoedelijke Periode</label>
                <input type="text" id="datering" placeholder="Bijv. 2e eeuw na Chr., Middeleeuws...">
                <div class="quick-tags">
                    <button type="button" class="tag-btn" onclick="setDatering('Romeins')">Romeins</button>
                    <button type="button" class="tag-btn" onclick="setDatering('Middeleeuws')">Middeleeuws</button>
                    <button type="button" class="tag-btn" onclick="setDatering('16e-18e eeuw')">16e-18e eeuw</button>
                    <button type="button" class="tag-btn" onclick="setDatering('Modern / WO')">Modern / WO</button>
                </div>
            </div>

            <div class="form-group">
                <label for="locatie-naam">📍 Stad / Dorp / Zoekveld (Zichtbare naam)</label>
                <input type="text" id="locatie-naam" placeholder="Bijv. Stabroek - Grote Akker, Schoten...">
            </div>

            <div class="form-group">
                <label for="locatie-gps">🌍 Exacte GPS Coördinaten (Achtergrond)</label>
                <input type="text" id="locatie-gps" placeholder="Bijv. 51.331234, 4.365432">
                <button type="button" class="gps-btn" onclick="haalGPS()">📍 Leg Huidige Exacte GPS Vast</button>
            </div>

            <div class="form-group">
                <label for="weblink">🌐 Referentie Website / Link</label>
                <input type="url" id="weblink" placeholder="https://www.example.com/munt-info">
            </div>

            <div class="form-group">
                <label for="info">📜 Extra Informatie</label>
                <textarea id="info" placeholder="Waarvoor diende het? Details..."></textarea>
            </div>

            <div class="form-group">
                <label for="foto1">📸 Foto 1 (Voorkant)</label>
                <input type="file" id="foto1" accept="image/*" onchange="verwerkFoto(event, 1)">
            </div>

            <div class="form-group">
                <label for="foto2">📸 Foto 2 (Achterkant)</label>
                <input type="file" id="foto2" accept="image/*" onchange="verwerkFoto(event, 2)">
            </div>

            <div class="preview-img-container">
                <div id="wrapper-preview1" class="preview-wrapper">
                    <img id="img-preview1" class="preview-img" alt="Voorbeeld Voorkant">
                    <button type="button" class="btn-delete-photo" onclick="wisSpecifiekeFoto(1)">🗑️ Wis foto 1</button>
                </div>
                <div id="wrapper-preview2" class="preview-wrapper">
                    <img id="img-preview2" class="preview-img" alt="Voorbeeld Achterkant">
                    <button type="button" class="btn-delete-photo" onclick="wisSpecifiekeFoto(2)">🗑️ Wis foto 2</button>
                </div>
            </div>

            <button class="main-btn" id="opslaan-btn" onclick="slaVondstOp()">Vondst Opslaan</button>
            <button class="main-btn" id="annuleer-btn" style="background-color:#334155; color:white;" onclick="sluitInvoerFormulier()">Annuleren</button>
        </div>
    </div>

    <div id="page-verzameling">
        <div class="search-container">
            <input type="text" id="app-search" class="search-input" placeholder="Zoek op omschrijving, datering, locatie of info..." oninput="filterVondstenLive()">
        </div>

        <div class="tabs">
            <div class="tab active" onclick="filterCategorie(event, 'Alles')">Alles</div>
            <div class="tab" onclick="filterCategorie(event, 'Munten')">🪙 Munten</div>
            <div class="tab" onclick="filterCategorie(event, 'Gespen')">🔍 Gespen</div>
            <div class="tab" onclick="filterCategorie(event, 'Militaria')">🛡️ Militaria</div>
            <div class="tab" onclick="filterCategorie(event, 'Gebruiksvoorwerpen')">🗝️ Voorwerpen</div>
            <div class="tab" onclick="filterCategorie(event, 'Overig')">🏺 Overig</div>
        </div>

        <div id="vondsten-lijst"></div>
        
        <div class="excel-box">
            <h2>📥 Oude Vondsten uit Excel laden</h2>
            <div class="form-group">
                <label for="import-cat">Stap 1: Kies in welk mapje de Excel-rijen moeten komen</label>
                <select id="import-cat">
                    <option value="Munten">🪙 Munten</option>
                    <option value="Gespen">🔍 Gespen & Knopen</option>
                    <option value="Militaria">🛡️ Militaria</option>
                    <option value="Gebruiksvoorwerpen">🗝️ Gebruiksvoorwerpen</option>
                    <option value="Overig">🏺 Overig / Varia / Loodjes</option>
                </select>
            </div>
            <div class="form-group">
                <label for="csv-file">Stap 2: Selecteer het bewaarde .csv-bestand</label>
                <input type="file" id="csv-file" accept=".csv" onchange="importeerCSV(event)">
            </div>
        </div>

        <button class="excel-btn" onclick="exporteerNaarCSV()">📥 Back-up maken: Exporteer heel de App naar Excel (CSV)</button>
        <button class="danger-btn" onclick="wisAlles()">⚠️ App Geheugen Volledig Wissen</button>
    </div>

    <div id="lightbox" class="lightbox" onclick="sluitPopups(event)">
        <button class="lightbox-close" onclick="sluitPopups(event)">✕ Sluiten</button>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Vergroting" style="display:none;">
        <div id="lightbox-caption" class="lightbox-caption" style="display:none;"></div>
        <div id="info-popup-box" class="info-box" style="display:none;">
            <h3 id="info-popup-titel">Voorwerp Info</h3>
            <p id="info-popup-tekst" style="white-space: pre-wrap; line-height: 1.5;"></p>
        </div>
    </div>

    <button id="btn-to-top" class="scroll-to-top" onclick="gaNaarBoven()">↑</button>

    <script>
        let foto1DataUrl = "";
        let foto2DataUrl = "";
        let actieveKaarten = {}; 
        let huidigeActieveCategorie = "Alles";

        window.onscroll = function() {
            const btn = document.getElementById('btn-to-top');
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                btn.style.display = "flex";
            } else {
                btn.style.display = "none";
            }
        };

        function gaNaarBoven() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleInvoerFormulier() {
            const formPage = document.getElementById('page-invoer');
            const btn = document.getElementById('top-toggle-btn');
            
            if(formPage.classList.contains('active')) {
                sluitInvoerFormulier();
            } else {
                formPage.classList.add('active');
                btn.innerText = "✕ Sluiten";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function sluitInvoerFormulier() {
            document.getElementById('page-invoer').classList.remove('active');
            document.getElementById('top-toggle-btn').innerText = "➕ Nieuwe Vondst";
            resetFormulier();
        }

        function setDatering(waarde) {
            document.getElementById('datering').value = waarde;
        }

        function haalGPS() {
            if (navigator.geolocation) {
                const opties = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById('locatie-gps').value = 
                            position.coords.latitude.toFixed(6) + ", " + position.coords.longitude.toFixed(6);
                    }, 
                    function(error) { alert("GPS-signaal niet gevonden."); },
                    opties
                );
            }
        }

        function verwerkFoto(event, fotoNummer) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const max_size = 600; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const gecomprimeerdeDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    const wrapper = document.getElementById(`wrapper-preview${fotoNummer}`);
                    const preview = document.getElementById(`img-preview${fotoNummer}`);
                    preview.src = gecomprimeerdeDataUrl;
                    wrapper.style.display = 'flex';

                    if (fotoNummer === 1) foto1DataUrl = gecomprimeerdeDataUrl;
                    if (fotoNummer === 2) foto2DataUrl = gecomprimeerdeDataUrl;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // DE GECORRIGEERDE WIS-FUNCTIE DIE HET INPUTVELD COMPLEET LEEGMAAKT
        function wisSpecifiekeFoto(fotoNummer) {
            const inputVeld = document.getElementById(`foto${fotoNummer}`);
            if(inputVeld) inputVeld.value = ""; 
            
            document.getElementById(`img-preview${fotoNummer}`).src = "";
            document.getElementById(`wrapper-preview${fotoNummer}`).style.display = 'none';
            
            if (fotoNummer === 1) foto1DataUrl = "";
            if (fotoNummer === 2) foto2DataUrl = "";
        }

        function importeerCSV(event) {
            const file = event.target.files[0];
            if (!file) return;

            const geselecteerdeCategorie = document.getElementById('import-cat').value;
            const reader = new FileReader();

            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.split(/\r?\n/);
                let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
                let geladenAantal = 0;
                let koppenIndex = -1;

                for(let i = 0; i < lines.length; i++) {
                    if (lines[i].toLowerCase().includes('omschrijving') && lines[i].toLowerCase().includes('dating') || lines[i].toLowerCase().includes('datering')) {
                        koppenIndex = i;
                        break;
                    }
                }

                if(koppenIndex === -1) {
                    alert("⚠️ Kon de kolom 'Omschrijving' of 'Datering' niet vinden. Controleer of het bestand juist is opgeslagen.");
                    return;
                }

                let scheidingsteken = lines[koppenIndex].includes(';') ? ';' : ',';
                let koppen = lines[koppenIndex].split(scheidingsteken).map(k => k.trim().toLowerCase());

                const idxOmschrijving = koppen.findIndex(k => k.includes('omschrijving'));
                const idxDatering = koppen.findIndex(k => k.includes('datering') || k === 'dating');
                const idxVindplaats = koppen.findIndex(k => k.includes('vindplaats'));
                const idxExtraInfo = koppen.findIndex(k => k.includes('extra info') || k.includes('opmerking'));

                for(let i = koppenIndex + 1; i < lines.length; i++) {
                    if(!lines[i].trim()) continue;

                    let row = lines[i].split(scheidingsteken).map(r => r.replace(/^"|"$/g, '').trim());
                    if(row.length < 2 || !row[idxOmschrijving]) continue;

                    const nieuweVondst = {
                        id: Date.now() + i, 
                        categorie: geselecteerdeCategorie,
                        materiaal: "Onbekend",
                        titel: row[idxOmschrijving],
                        datering: idxDatering !== -1 ? row[idxDatering] : "Onbekend",
                        locatieNaam: idxVindplaats !== -1 ? row[idxVindplaats] : "Onbekend",
                        locatieGps: "",
                        weblink: "",
                        info: idxExtraInfo !== -1 ? row[idxExtraInfo] : "",
                        foto1: "",
                        foto2: ""
                    };

                    huidigeVondsten.push(nieuweVondst);
                    geladenAantal++;
                }

                try {
                    localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));
                    alert(`🎉 Succes! Er zijn ${geladenAantal} vondsten succesvol ingeladen in het mapje!`);
                    document.getElementById('csv-file').value = "";
                    toonVondsten(huidigeActieveCategorie);
                } catch(error) {
                    alert("⚠️ Het browsergeheugen zit vol.");
                }
            };

            reader.readAsText(file, "UTF-8");
        }

        function slaVondstOp() {
            const categorie = document.getElementById('categorie').value;
            const materiaal = document.getElementById('materiaal').value;
            const titel = document.getElementById('titel').value;
            const datering = document.getElementById('datering').value;
            const locatieNaam = document.getElementById('locatie-naam').value;
            const locatieGps = document.getElementById('locatie-gps').value;
            const weblink = document.getElementById('weblink').value;
            const info = document.getElementById('info').value;
            const bewerkId = document.getElementById('bewerk-id').value;

            if(!titel) { alert("Vul tenminste een beschrijving in."); return; }

            let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];

            if (bewerkId) {
                huidigeVondsten = huidigeVondsten.map(vondst => {
                    if (vondst.id == bewerkId) {
                        return {
                            id: vondst.id,
                            categorie, materiaal, titel, datering, 
                            locatieNaam: locatieNaam || "Onbekende locatie", 
                            locatieGps, weblink, info,
                            foto1: foto1DataUrl, 
                            foto2: foto2DataUrl
                        };
                    }
                    return vondst;
                });
                alert("Vondst succesvol bijgewerkt!");
            } else {
                const nieuweVondst = {
                    id: Date.now(),
                    categorie, materiaal, titel, datering, 
                    locatieNaam: locatieNaam || "Onbekende locatie", 
                    locatieGps, weblink, info,
                    foto1: foto1DataUrl,
                    foto2: foto2DataUrl
                };
                huidigeVondsten.push(nieuweVondst);
                alert("Vondst succesvol opgeslagen!");
            }

            try {
                localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));
                sluitInvoerFormulier();
                toonVondsten(huidigeActieveCategorie); 
            } catch (e) {
                alert("⚠️ Geheugen vol.");
            }
        }

        function resetFormulier() {
            document.getElementById('titel').value = "";
            document.getElementById('datering').value = "";
            document.getElementById('locatie-naam').value = "";
            document.getElementById('locatie-gps').value = "";
            document.getElementById('weblink').value = "";
            document.getElementById('info').value = "";
            document.getElementById('bewerk-id').value = "";
            document.getElementById('materiaal').value = "Onbekend";
            
            if(document.getElementById('foto1')) document.getElementById('foto1').value = "";
            if(document.getElementById('foto2')) document.getElementById('foto2').value = "";
            
            document.getElementById('wrapper-preview1').style.display = 'none';
            document.getElementById('wrapper-preview2').style.display = 'none';
            document.getElementById('img-preview1').src = "";
            document.getElementById('img-preview2').src = "";
            document.getElementById('form-titel').innerText = "Nieuwe Vondst";
            document.getElementById('opslaan-btn').innerText = "Vondst Opslaan";
            foto1DataUrl = "";
            foto2DataUrl = "";
        }

        function toggleKaart(id, gpsSnaar, titel) {
            const mapDiv = document.getElementById(`map-${id}`);
            if (!mapDiv) return;

            if (mapDiv.style.display === 'block') {
                mapDiv.style.display = 'none';
                return;
            }

            mapDiv.style.display = 'block';

            if (!gpsSnaar || !gpsSnaar.includes(',')) return;
            const coords = gpsSnaar.split(',');
            const lat = parseFloat(coords[0].trim());
            const lng = parseFloat(coords[1].trim());

            if (!isNaN(lat) && !isNaN(lng)) {
                setTimeout(() => {
                    if (actieveKaarten[id]) {
                        actieveKaarten[id].invalidateSize();
                        return;
                    }

                    const m = L.map(`map-${id}`).setView([lat, lng], 15);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);

                    const marker = L.marker([lat, lng]).addTo(m);
                    marker.bindPopup(`<b>${titel}</b>`).openPopup();
                    
                    actieveKaarten[id] = m;
                }, 200);
            }
        }

        function bewerkVondst(id) {
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            const vondst = huidigeVondsten.find(v => v.id == id);
            
            if (vondst) {
                document.getElementById('categorie').value = vondst.categorie;
                document.getElementById('materiaal').value = vondst.materiaal || "Onbekend";
                document.getElementById('titel').value = vondst.titel;
                document.getElementById('datering').value = vondst.datering || "";
                document.getElementById('locatie-naam').value = vondst.locatieNaam || "";
                document.getElementById('locatie-gps').value = vondst.locatieGps || "";
                document.getElementById('weblink').value = vondst.weblink || "";
                document.getElementById('info').value = vondst.info || "";
                document.getElementById('bewerk-id').value = vondst.id;

                // Previews correct vullen zonder te wissen
                document.getElementById('wrapper-preview1').style.display = 'none';
                document.getElementById('wrapper-preview2').style.display = 'none';
                document.getElementById('img-preview1').src = "";
                document.getElementById('img-preview2').src = "";

                if (vondst.foto1) {
                    document.getElementById('img-preview1').src = vondst.foto1;
                    document.getElementById('wrapper-preview1').style.display = 'flex';
                    foto1DataUrl = vondst.foto1;
                } else {
                    foto1DataUrl = "";
                }
                
                if (vondst.foto2) {
                    document.getElementById('img-preview2').src = vondst.foto2;
                    document.getElementById('wrapper-preview2').style.display = 'flex';
                    foto2DataUrl = vondst.foto2;
                } else {
                    foto2DataUrl = "";
                }

                document.getElementById('form-titel').innerText = "✏️ Vondst Bewerken";
                document.getElementById('opslaan-btn').innerText = "Wijzigingen Opslaan";
                
                document.getElementById('page-invoer').classList.add('active');
                document.getElementById('top-toggle-btn').innerText = "✕ Sluiten";
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function verwijderVondst(id) {
            if (confirm("Weet je zeker dat je deze specifieke vondst wilt verwijderen?")) {
                let huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
                huidigeVondsten = huidigeVondsten.filter(v => v.id != id);
                localStorage.setItem('detectorVondsten', JSON.stringify(huidigeVondsten));
                toonVondsten(huidigeActieveCategorie);
            }
        }

        function toonVondsten(filter = 'Alles', zoekTerm = "") {
            const lijst = document.getElementById('vondsten-lijst');
            lijst.innerHTML = "";
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            actieveKaarten = {}; 
            
            const schoneZoekTerm = zoekTerm.toLowerCase().trim();

            huidigeVondsten.forEach(vondst => {
                if (filter !== 'Alles' && vondst.categorie !== filter) return;

                if (schoneZoekTerm !== "") {
                    const inTitel = (vondst.titel || "").toLowerCase().includes(schoneZoekTerm);
                    const inMateriaal = (vondst.materiaal || "").toLowerCase().includes(schoneZoekTerm);
                    const inDatering = (vondst.datering || "").toLowerCase().includes(schoneZoekTerm);
                    const inLocatie = (vondst.locatieNaam || "").toLowerCase().includes(schoneZoekTerm);
                    const inInfo = (vondst.info || "").toLowerCase().includes(schoneZoekTerm);

                    if (!inTitel && !inMateriaal && !inDatering && !inLocatie && !inInfo) return;
                }

                const schoneGps = (vondst.locatieGps || "").trim();
                const heeftGps = schoneGps.includes(',');
                const googleMapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(schoneGps)}`;
                const heeftWeblink = vondst.weblink && vondst.weblink.trim().startsWith('http');

                const card = document.createElement('div');
                card.className = 'vondst-card';
                
                card.innerHTML = `
                    <div class="vondst-header">
                        <span>${vondst.titel}</span>
                        <span style="color:var(--accent-gold); font-size:13px; font-family:sans-serif; font-weight:normal;">${vondst.categorie}</span>
                    </div>
                    <div class="vondst-meta">💎 <b>Materiaal:</b> ${vondst.materiaal || 'Onbekend'}</div>
                    <div class="vondst-meta">📅 <b>Datering:</b> ${vondst.datering || 'Onbekend'}</div>
                    <div class="vondst-meta">📍 <b>Locatie:</b> ${vondst.locatieNaam || 'Niet vastgelegd'}</div>
                    
                    <div class="foto-container">
                        ${vondst.foto1 ? `
                            <div class="img-wrapper" onclick="openFoto('${vondst.foto1}', '${vondst.titel} - Voorkant')">
                                <img src="${vondst.foto1}" class="card-img">
                                <div class="zoom-icon">🔍</div>
                            </div>` : ''}
                        ${vondst.foto2 ? `
                            <div class="img-wrapper" onclick="openFoto('${vondst.foto2}', '${vondst.titel} - Achterkant')">
                                <img src="${vondst.foto2}" class="card-img">
                                <div class="zoom-icon">🔍</div>
                            </div>` : ''}
                    </div>

                    <div id="map-${vondst.id}" class="inline-map"></div>
                    ${heeftGps ? `<a href="${googleMapsUrl}" target="_blank" id="gmaps-link-${vondst.id}" class="maps-btn-inline" style="display:none;">🗺️ Route openen in Google Maps</a>` : ''}

                    <div class="action-buttons">
                        <button class="btn-small btn-info" onclick="openInfo(${vondst.id})">ℹ️ Info</button>
                        ${heeftWeblink ? `<a href="${vondst.weblink.trim()}" target="_blank" class="btn-small btn-web">🌐 Link</a>` : ''}
                        ${heeftGps ? `<button class="btn-small btn-map" onclick="toggleKaart(${vondst.id}, '${schoneGps}', '${vondst.titel}'); document.getElementById('gmaps-link-${vondst.id}').style.display = (document.getElementById('gmaps-link-${vondst.id}').style.display === 'block' ? 'none' : 'block');">🗺️ Kaart</button>` : ''}
                        <button class="btn-small btn-edit" onclick="bewerkVondst(${vondst.id})">✏️ Bewerk</button>
                        <button class="btn-small btn-delete" onclick="verwijderVondst(${vondst.id})">🗑️ Wis</button>
                    </div>
                `;
                lijst.appendChild(card);
            });

            if(lijst.innerHTML === "") {
                lijst.innerHTML = "<p style='text-align:center; color:#64748b;'>Geen vondsten gevonden.</p>";
            }
        }

        function filterVondstenLive() {
            const zoekTerm = document.getElementById('app-search').value;
            toonVondsten(huidigeActieveCategorie, zoekTerm);
        }

        function filterCategorie(event, cat) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            huidigeActieveCategorie = cat;
            const zoekTerm = document.getElementById('app-search').value;
            toonVondsten(cat, zoekTerm);
        }

        function exporteerNaarCSV() {
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            if (huidigeVondsten.length === 0) { alert("Geen data."); return; }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "ID;Categorie;Materiaal;Beschrijving;Datering;Locatienaam;GPS-Coordinaten;Referentielink;Extra Informatie\r\n";

            huidigeVondsten.forEach(v => {
                let schoneInfo = (v.info || "").replace(/;/g, ",").replace(/\r?\n|\r/g, " ");
                let schoneTitel = (v.titel || "").replace(/;/g, ",");
                let schoneDatering = (v.datering || "").replace(/;/g, ",");
                let schoneLocatieNaam = (v.locatieNaam || "Onbekend").replace(/;/g, " ");
                let schoneLocatieGps = (v.locatieGps || "").replace(/;/g, " ");
                let schoneWeblink = (v.weblink || "").replace(/;/g, " ");
                csvContent += `${v.id};${v.categorie};${v.materiaal || 'Onbekend'};${schoneTitel};${schoneDatering};${schoneLocatieNaam};${schoneLocatieGps};${schoneWeblink};${schoneInfo}\r\n`;
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Mijn_Vondsten_Backup.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function openFoto(src, caption) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox-caption').innerText = caption;
            document.getElementById('lightbox-img').style.display = 'block';
            document.getElementById('lightbox-caption').style.display = 'block';
            document.getElementById('info-popup-box').style.display = 'none';
            document.getElementById('lightbox').style.display = 'flex';
        }

        function openInfo(id) {
            const huidigeVondsten = JSON.parse(localStorage.getItem('detectorVondsten')) || [];
            const vondst = huidigeVondsten.find(v => v.id == id);
            
            if (vondst) {
                document.getElementById('info-popup-titel').innerText = `📜 Info: ${vondst.titel}`;
                document.getElementById('info-popup-tekst').innerText = vondst.info || "Nog geen extra historische informatie toegevoegd.";
                document.getElementById('lightbox-img').style.display = 'none';
                document.getElementById('lightbox-caption').style.display = 'none';
                document.getElementById('info-popup-box').style.display = 'block';
                document.getElementById('lightbox').style.display = 'flex';
            }
        }

        function sluitPopups(event) {
            if (event.target.id === 'lightbox' || event.target.className === 'lightbox-close' || event.target.tagName === 'BUTTON') {
                document.getElementById('lightbox').style.display = 'none';
            }
        }

        function wisAlles() {
            if(confirm("Weet je zeker dat je ALLES wilt wissen?")) {
                localStorage.removeItem('detectorVondsten');
                sluitInvoerFormulier();
                document.getElementById('app-search').value = "";
                toonVondsten();
                alert("Geheugen gewist!");
            }
        }

        window.onload = function() { toonVondsten(); };
    </script>
